name: EdgeMindAi
options:
  bundleIdPrefix: io.example
  deploymentTarget:
    iOS: 17.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.vinothrajalingam.EdgeMindAi
    DEVELOPMENT_TEAM: "43NV5DTHKG"
    CODE_SIGN_STYLE: Automatic
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 0.2.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Edge Mind Ai
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: NO
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    revision: 944828ff66e216b7ae6991fabe471cc42f1cf37c
  LiteRT-LM:
    path: Vendor/LiteRT-LM
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
targets:
  EdgeMindAi:
    type: application
    platform: iOS
    sources:
      - path: EdgeMindAi
    resources:
      - path: EdgeMindAi/Resources
    dependencies:
      - framework: Vendor/build-apple/llama.xcframework
        embed: true
        codeSign: true
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: LiteRT-LM
        product: LiteRTLM
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: EdgeMindAi/EdgeMindAi.entitlements
        INFOPLIST_KEY_CFBundleName: Edge Mind Ai
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSCameraUsageDescription: "Take a photo to ask AI about what you see"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Use Face ID to unlock your local profile"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Use the microphone to dictate prompts for on-device voice chat"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Attach a photo to ask AI about it"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Convert your spoken prompts into text on-device"
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    postBuildScripts:
      - name: Generate CLiteRTLM dSYM
        script: |
          set -e
          if [ "$CONFIGURATION" != "Release" ]; then
            exit 0
          fi

          FRAMEWORK_BINARY="$TARGET_BUILD_DIR/$FRAMEWORKS_FOLDER_PATH/CLiteRTLM.framework/CLiteRTLM"
          OUTPUT_DSYM="$DWARF_DSYM_FOLDER_PATH/CLiteRTLM.framework.dSYM"

          if [ ! -f "$FRAMEWORK_BINARY" ]; then
            exit 0
          fi

          mkdir -p "$DWARF_DSYM_FOLDER_PATH"
          dsymutil "$FRAMEWORK_BINARY" -o "$OUTPUT_DSYM" || true
    scheme:
      gatherCoverageData: false
      testTargets:
        - EdgeMindAiTests

  EdgeMindAiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EdgeMindAiTests
    resources:
      - path: EdgeMindAi/Resources/RuntimeProfiles.json
      - path: EdgeMindAi/Resources/PromptTemplates.json
    dependencies:
      - target: EdgeMindAi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
