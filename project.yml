name: LocalAIEdgeApp
options:
  bundleIdPrefix: io.example
  deploymentTarget:
    iOS: 17.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: io.example.LocalAIEdgeApp
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Private Edge Chat
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: NO
packages: {}
targets:
  LocalAIEdgeApp:
    type: application
    platform: iOS
    sources:
      - path: LocalAIEdgeApp
    resources:
      - path: LocalAIEdgeApp/Resources
    dependencies:
      - framework: Vendor/build-apple/llama.xcframework
        embed: true
        codeSign: false
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: LocalAIEdgeApp/LocalAIEdgeApp.entitlements
        INFOPLIST_KEY_CFBundleName: LocalAIEdgeApp
        INFOPLIST_KEY_LSRequiresIPhoneOS: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_NSCameraUsageDescription: "Take a photo to ask AI about what you see"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Use Face ID to unlock your local profile"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Use the microphone to dictate prompts for on-device voice chat"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Attach a photo to ask AI about it"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Convert your spoken prompts into text on-device"
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    scheme:
      gatherCoverageData: false
      testTargets:
        - LocalAIEdgeAppTests

  LocalAIEdgeAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LocalAIEdgeAppTests
    dependencies:
      - target: LocalAIEdgeApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
